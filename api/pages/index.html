<!DOCTYPE html>
<html lang="pt-br">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-J9WKT43JKR"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-J9WKT43JKR');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Comics - Comic Database</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/favicon.png" />

    <style>

        body{
            background:#0f172a;
            color:#fff;
        }        

    </style>

</head>

<body>

    <div id="navbar-container"></div>

    <!-- =======================================
         HERO / FEATURED
    ======================================== -->
    <section class="featured">

        <div id="featuredBackdrop" class="featured-backdrop"></div>

        <div class="featured-overlay"></div>

        <div class="container position-relative">

            <div class="row align-items-center gy-5">

                <!-- CAPA -->
                <div class="col-lg-3 text-center">

                    <img
                        id="featuredCover"
                        class="featured-cover"
                        src=""
                        alt="Capa do quadrinho">

                </div>

                <!-- INFORMAÇÕES -->
                <div class="col-lg-7">

                    <div id="featuredMeta" class="featured-meta"></div>

                    <h1 id="featuredTitle" class="featured-title">
                        Carregando...
                    </h1>

                    <p id="featuredDescription"
                       class="featured-description">
                    </p>

                    <div class="featured-buttons mt-4">

                        <a
                            id="featuredButton"
                            class="btn btn-warning btn-lg">

                            <i class="fa-solid fa-book-open me-2"></i>

                            Ver detalhes

                        </a>                        

                    </div>

                </div>

            </div>

            <!-- Miniaturas -->
            <div class="featured-navigation mt-5">

                <button
                    id="featuredPrev"
                    class="featured-arrow">

                    <i class="fa-solid fa-chevron-left"></i>

                </button>

                <div id="featuredThumbs"
                     class="featured-thumbs">
                </div>

                <button
                    id="featuredNext"
                    class="featured-arrow">

                    <i class="fa-solid fa-chevron-right"></i>

                </button>

            </div>

        </div>

    </section>


    <!-- =======================================
         POPULARES
    ======================================== -->

    <section class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h2 class="section-title mb-0">

                <i class="fa-solid fa-fire text-danger me-2"></i>

                <a href="/comics" class="text-decoration-none text-light">Quadrinhos Populares <i class="fa-solid fa-chevron-right me-2"></i></a>

            </h2>

        </div>

        <div id="popularGrid"
             class="horizontal-scroll">
        </div>

    </section>


    <!-- =======================================
         PERSONAGENS
    ======================================== -->

    <section class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h2 class="section-title mb-0">

                <i class="fa-solid fa-user-group text-info me-2"></i>

                <a href="/characters" class="text-decoration-none text-light">Personagens Populares <i class="fa-solid fa-chevron-right me-2"></i></a>

            </h2>

        </div>

        <div id="charactersGrid"
             class="horizontal-scroll">
        </div>

    </section>


    <!-- =======================================
         MAIS BEM AVALIADOS
    ======================================== -->

    <section class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h2 class="section-title mb-0">

                <i class="fa-solid fa-star text-warning me-2"></i>

                <a href="/comics" class="text-decoration-none text-light">Mais bem avaliados <i class="fa-solid fa-chevron-right me-2"></i></a>

            </h2>

        </div>

        <div id="topGrid"
             class="horizontal-scroll">
        </div>

    </section>


    <!-- =======================================
         RECENTES
    ======================================== -->

    <section class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h2 class="section-title mb-0">

                <i class="fa-solid fa-clock text-success me-2"></i>

                <a href="/comics" class="text-decoration-none text-light">Adicionados recentemente <i class="fa-solid fa-chevron-right me-2"></i></a>

            </h2>

        </div>

        <div id="recentGrid"
             class="horizontal-scroll">
        </div>

    </section>


    <div id="footer"></div>


    <!-- =======================================
         SCRIPTS
    ======================================== -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/js/public/config.js"></script>
    <script src="/js/admin/auth.js"></script>
    <script src="/js/public/layout.js"></script>
    <script src="/js/public/navbar.js"></script>

    <script src="/js/utils/slug.js"></script>
    <script src="/js/utils/routes.js"></script>

    <script src="/js/public/home.js"></script>

    <script src="/js/public/global-search.js" defer></script>

</body>
</html>
