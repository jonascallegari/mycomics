    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="description"
      content="My Comics é um banco de dados de quadrinhos com informações sobre HQs, personagens, criadores, editoras, avaliações e coleções pessoais.">

    <meta name="keywords"
        content="quadrinhos, HQ, comics, Marvel, DC Comics, Image Comics, personagens, banco de dados, graphic novels">

    <meta name="author"
        content="My Comics">

    <meta name="robots"
        content="index, follow">

    <link rel="canonical"
        href="https://mycomics.com.br/">

    <meta property="og:type" content="website">
    <meta property="og:title"
        content="My Comics">

    <meta property="og:description"
        content="Banco de dados de quadrinhos, personagens, criadores e editoras.">

    <meta property="og:image"
        content="https://mycomics.com.br/public/assets/img/social-cover.png">

    <meta property="og:url"
        content="https://mycomics.com.br/">

        content="My Comics">
        
    <title>My Comics – Detalhes do Criador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Core theme CSS -->
    <link href="../css/style.css" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/favicon.png" />
</head>

<body class="bg-light">
    
        <div id="navbar-container"></div>
        
        <!-- HERO -->
        <div class="creator-hero">
            <div class="creator-bg" id="creatorBg"></div>
        
            <div class="creator-content container text-center">
                <img id="creatorImage" class="creator-image">
                <h1 id="creatorName"></h1>
                <h5 id="creatorRole" class="text-light"></h5>
            </div>
        </div>
        
        <!-- CONTEÚDO -->
        <div class="container mt-5">
            <div class="row mb-4">
                <div class="col-md-3">
                    <h4>Informações</h4>
                    <ul class="list-group shadow-sm">
                        <li class="list-group-item">
                            <strong>País de Origem:</strong>
                            <span id="creatorNationality"></span>
                        </li>
                        <li class="list-group-item">
                            <strong>Ano de Nascimento:</strong>
                            <span id="creatorBirthYear"></span>
                        </li>
                    </ul>
                </div>

                <!-- HISTÓRICO -->
                <div class="col-md-9">
                    <h3>Histórico</h3>
                    <p id="creatorBio" class="text-justify"></p>
                </div>
            </div>            
        
            <hr>
        
            <h3>Quadrinhos relacionados</h3>
            <div class="row" id="comicsList"></div>
        </div>

      

    <!-- MODAL ZOOM CAPA -->
    <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal">
            <div class="modal-content bg-transparent border-0">
                <div class="modal-body text-center p-0">
                    <img id="imageZoom" src="" class="img-fluid rounded shadow-lg" alt="Imagem ampliada" />
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../js/admin/config.js"></script>
    <script src="../js/admin/auth.js"></script>
    <script src="../js/public/layout.js"></script>
    <script src="../js/public/navbar.js"></script>
    <script src="/js/utils/slug.js"></script>
    <script src="/js/utils/routes.js"></script>
    <script src="../js/public/creatorDetail.js"></script>
    <script src="../js/public/global-search.js" defer></script>
</body>
