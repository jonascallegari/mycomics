<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>My Comics – Personagens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Core theme CSS -->
    <link href="../css/style.css" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/favicon.png" />
</head>

<body class="bg-light">
        <div id="navbar-container"></div>
        
        <div class="container mt-4">
            <h1>Personagens</h1>     
            <div class="row mb-4">
                <div class="col-md-8">
                    <input type="text" id="searchInput" class="form-control" placeholder="Buscar personagem...">
                </div>
            
                <div class="col-md-4">
                    <select id="publisherFilter" class="form-select">
                        <option value="">Todas as editoras</option>
                    </select>
                </div>
            </div>

            <div id="alphabetFilter" class="mb-3 text-center"></div>
        
            <div id="charactersGrid" class="grid"></div>

            <nav class="mt-4">
                <ul class="pagination justify-content-center" id="pagination"></ul>
            </nav>
        </div>    

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/js/public/config.js"></script>
    <script src="/js/admin/auth.js"></script>
    <script src="/js/public/layout.js"></script>
    <script src="/js/public/navbar.js"></script>
    <script src="/js/utils/slug.js"></script>
    <script src="/js/utils/routes.js"></script>
    <script type="module" src="/js/public/characters.js"></script>
    <script src="/js/public/global-search.js" defer></script>
</body>

</html>
