    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meus Reviews - My Comics</title>

    <meta name="description"
      content="My Comics é um banco de dados de quadrinhos com informações sobre HQs, personagens, criadores, editoras, avaliações e coleções pessoais.">

    <meta name="keywords"
        content="quadrinhos, HQ, comics, Marvel, DC Comics, Image Comics, personagens, banco de dados, graphic novels">

    <meta name="author"
        content="My Comics">

    <meta name="robots"
        content="index, follow">

    <link rel="canonical"
        href="https://mycomics.com.br/">

    <meta property="og:type" content="website">
    <meta property="og:title"
        content="My Comics">

    <meta property="og:description"
        content="Banco de dados de quadrinhos, personagens, criadores e editoras.">

    <meta property="og:image"
        content="https://mycomics.com.br/public/assets/img/social-cover.png">

    <meta property="og:url"
        content="https://mycomics.com.br/">

    <meta property="og:site_name"
        content="My Comics">
        
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Core theme CSS -->
    <link href="../css/style.css" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/favicon.png" />

    <!-- Ícones (Font Awesome, se já estiver usando) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<body class="bg-light">
    <div id="navbar-container"></div>

    <main class="container mt-5">
    
        <h2>Minhas Avaliações</h2>
        
        <div id="reviewsContainer"></div>
        <div id="myReviewsPagination" class="mt-3"></div>
    
    </main>

    <div id="footer"></div>

    <div id="avatarModal" class="avatar-modal">
        <span class="avatar-close">&times;</span>
        <img id="avatarModalImg" alt="Avatar ampliado">
    </div>

    <div class="modal fade" id="editReviewModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Avaliação</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
    
                <div class="modal-body">
                    <div id="starContainer" class="mb-2"></div>
    
                    <textarea id="editComment" class="form-control" rows="3" placeholder="Comentário">
            </textarea>
    
                    <input type="hidden" id="editComicId">
                    <input type="hidden" id="editRating">
                </div>
    
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>
    
                    <button class="btn btn-success" onclick="saveEditedReview()">
                        Salvar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../js/public/config.js"></script>
    <script src="../js/admin/auth.js"></script>
    <script src="../js/public/layout.js"></script>
    <script src="../js/public/navbar.js"></script>
    <script src="../js/public/my-reviews.js"></script>
    <script src="../js/public/global-search.js" defer></script>
    <script src="../assets/js/components/pagination.js"></script>
</body>

</html>
