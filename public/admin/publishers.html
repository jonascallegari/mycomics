<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <title>ICDB | Editoras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Editor de Texto -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <!-- Core theme CSS -->
    <link href="../css/style.css" rel="stylesheet" />
</head>

<body>
    <div id="navbar-container"></div>

    <div class="container mt-4">
        <h2>Cadastro de Editoras</h2>
        <form id="publisherForm" enctype="multipart/form-data">
            <input class="form-control mb-2" id="name" placeholder="Nome da Editora" required>
        
            <input type="file" id="logo" class="form-control mb-2" accept="image/*"> 

            <label class="form-label">Histórico da editora:</label>
            <div id="descriptionEditor" class="mb-2"></div>
            <input type="hidden" id="description">
        
            <input id="website" class="form-control mb-2" placeholder="Site oficial">
        
            <button class="btn btn-primary">Salvar</button>
        </form>

        <hr>

        <h3>Editoras Cadastradas</h3>                 
        <!-- <div class="row" id="publishersList"></div>  -->
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Logo</th>
                    <th>Editora</th>
                    <th>Site</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="publishersTable"></tbody>
        </table>
    </div>


    <div class="modal fade" id="editPublisherModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <form class="modal-content" id="editPublisherForm">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Editora</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
    
                <div class="modal-body">
                    <input type="hidden" id="editId">
    
                    <input class="form-control mb-2" id="editName" placeholder="Nome" required>
    
                    <input type="file" id="editLogo" class="form-control mb-2" accept="image/*">
    
                    <label class="form-label">Histórico da editora:</label>
                    <div id="editDescriptionEditor" class="mb-2"></div>
                    <input type="hidden" id="description">
    
                    <input id="editWebsite" class="form-control mb-2" placeholder="Site oficial">
                </div>
    
                <div class="modal-footer">
                    <button class="btn btn-primary">Salvar alterações</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    
    <script src="../js/admin/config.js"></script>
    <script src="../js/admin/auth.js"></script>
    <script src="../js/admin/route-guard.js"></script>
    <script src="../js/admin/load-navbar.js"></script>
    <script src="../js/admin/navbar.js"></script>
    <script src="../assets/js/components/editor.js"></script>
    <script src="../js/admin/publishers.js"></script>
</body>
