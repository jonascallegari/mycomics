<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ICDB | Personagens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

    <!-- Core theme CSS -->
    <link href="../css/style.css" rel="stylesheet" />
</head>

<body>
    <div id="navbar-container"></div>  


    <div class="container mt-4">
        <h2>Cadastro de Personagens</h2>


        <form id="characterForm" class="row g-3">
            <div class="col-md-6">
                <input type="text" id="name" class="form-control" placeholder="Nome" required />
            </div>
            <div class="col-md-6">
                <input type="text" id="alias" class="form-control" placeholder="Alter ego / Codinome" />
            </div>
            <div class="col-md-12">
                <input type="file" id="image" class="form-control mb-2" accept="image/*">
                
                <img id="imagePreview" class="img-fluid mb-2 d-none rounded" style="max-height: 200px;">
            </div>
            
            <div class="col-md-6">
                <select id="publisher_id" class="form-select">
                    <option value="">Selecione a editora</option>
                </select>
            </div>
            <div class="col-md-6">
                <input type="text" id="first_appearance" class="form-control" placeholder="Primeira Aparição" />
            </div>
            <div class="col-md-12">
                <div id="historyEditor"></div>
                <input type="hidden" id="history">
            </div>
            <div class="col-md-12">
                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <button class="btn btn-primary">Salvar</button>
                </div>                
            </div>
        </form>
        <hr />
        <div class="row mb-3">
            <div class="col-md-6">
                <input
                    type="text"
                    id="searchInput"
                    class="form-control"
                    placeholder="Buscar personagem..."
                >
            </div>
        </div>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Imagem</th>
                    <th>Codinome</th>
                    <th>Nome</th>                    
                    <th>Editora</th>
                    <th>Primeira Aparição</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="charactersTable"></tbody>
        </table>

        <div id="pagination" class="my-4"></div>
    </div>

    <!-- Modal Editar Quadrinho -->
    <div class="modal fade" id="editCharacterModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <form id="editCharacterForm" class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Personagem</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
    
                <div class="modal-body row g-3">
                    <input type="hidden" id="edit_id">
    
                    <div class="col-md-8">
                        <label class="form-label mb-0">Nome:</label>
                        <input type="text" id="edit_name" class="form-control" placeholder="Nome" required>
                    </div>
    
                    <div class="col-md-4">
                        <label class="form-label mb-0">Alias:</label>
                        <input type="text" id="edit_alias" class="form-control" placeholder="Codinome">
                    </div>

                    <div class="col-md-12">
                        <label class="form-label">Nova Imagem (opcional)</label>
                        <input type="file" id="edit_image" class="form-control" accept="image/*">
                        <img id="editImagePreview" class="img-fluid mb-2 rounded d-none" style="max-height: 200px;">
                    </div>
    
                    <div class="col-md-4">
                        <label class="form-label mb-0">Editora:</label>
                        <select id="edit_publisher_id" class="form-select">
                            <option value="">Selecione a editora</option>
                        </select>
                    </div>
    
                    <div class="col-md-4">
                        <label class="form-label mb-0">Primeira Aparição:</label>
                        <input type="text" id="edit_first_appearance" class="form-control" placeholder="Primeira Aparição">
                    </div>

                    <div class="col-md-12">
                        <label class="form-label mb-0">Histórico:</label>
                        <div id="editHistoryEditor"></div>
                        <input type="hidden" id="edit_history">                       
                    </div>
                    
                </div>
    
                <div class="modal-footer">
                    <button class="btn btn-primary">Salvar alterações</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="../js/admin/config.js"></script>
    <script src="../js/admin/auth.js"></script>
    <script src="../js/admin/route-guard.js"></script>
    <script src="../js/admin/load-navbar.js"></script>
    <script src="../js/admin/navbar.js"></script>
    <script src="../assets/js/components/editor.js"></script>
    <script type="module" src="../js/admin/characters.js"></script>    
</body>

</html>
