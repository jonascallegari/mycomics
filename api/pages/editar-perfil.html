<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Perfil do Usuário - My Comics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Core theme CSS -->
    <link href="../css/style.css" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/favicon.png" />

    <!-- Ícones (Font Awesome, se já estiver usando) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Cropper -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"
        onerror="this.onerror=null;this.href='./assets/vendor/cropper/cropper.min.css';" />
</head>

<body class="bg-light">
    <div id="navbar-container"></div>

    <main class="container profile-page">
        <h2>Editar Perfil</h2>
    
        <form id="editProfileForm" class="profile-card">
            <div class="row">
                <div class="col-md-4">
                    <div class="profile-avatar">
                        <img id="avatarPreview" src="./assets/img/placeholder-character.png">
                    </div>    

                    <label for="avatarFile" class="form-label">Alterar imagem do avatar</label>
                    <input class="form-control  form-control-sm" type="file" id="avatarFile" accept="image/*">
                    
                    <button id="cropSaveBtn" style="display:none;" class="btn btn-dark mt-2">
                        Salvar avatar
                    </button>
                </div>
                <div class="col-md-8">
                    <div class="profile-info">
                        <div class="mb-3">
                            <textarea id="bio" placeholder="Escreva algo sobre você..." rows="4" class="form-control"></textarea>
                        </div>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button type="submit" class="btn btn-dark">Salvar alterações</button>
                        </div>
                    </div>
                    <div class="my-3">
                        <label for="favoriteCharacter" class="form-label">
                            Personagem favorito
                        </label>
                        
                        <select id="favoriteCharacter" class="form-select">
                            <option value="">Selecione um personagem</option>
                        </select>
                    </div>

                    <div class="my-3">
                        <label for="favoriteComic" class="form-label">
                            Quadrinho Favorito
                        </label>
                    
                        <select id="favoriteComic" class="form-select">
                            <option value="">Selecione um quadrinho</option>
                        </select>
                    </div>
                    
                </div>
            </div>    
        </form>

        <hr class="my-5">

<h4>Alterar senha</h4>

<div class="profile-card">

    <div class="mb-3">
        <label class="form-label">Senha atual</label>
        <input
            type="password"
            id="currentPassword"
            class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Nova senha</label>
        <input
            type="password"
            id="newPassword"
            class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Confirmar nova senha</label>
        <input
            type="password"
            id="confirmPassword"
            class="form-control">
    </div>

    <div class="text-end">
        <button
            type="button"
            id="changePasswordBtn"
            class="btn btn-dark">
            Alterar senha
        </button>
    </div>

</div>
    </main>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        if (typeof Cropper === 'undefined') {
            const script = document.createElement('script');
            script.src = './assets/vendor/cropper/cropper.min.js';
            document.head.appendChild(script);
        }
    </script>
    <script src="../js/public/config.js"></script>
    <script src="../js/admin/auth.js"></script>
    <script src="../js/public/layout.js"></script>
    <script src="../js/public/navbar.js"></script>
    <script src="../js/public/editar-perfil.js"></script>
    <script src="../js/public/global-search.js" defer></script>
</body>

</html>
