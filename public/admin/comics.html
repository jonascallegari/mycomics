<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <title>ICDB | Quadrinhos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Editor de Texto -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <!-- Core theme CSS -->
    <link href="../css/style.css" rel="stylesheet" />
</head>

<body>
    <div id="navbar-container"></div> 

    <div class="container mt-4">
        <div class="card mb-4">
            <div class="card-header">
                <h2>Cadastro de Quadrinhos</h2>
            </div>
            
            <div class="card-body">
                <form id="comicForm" class="row g-3">
                    <div class="col-md-6">
                        <input type="text" id="title" class="form-control" placeholder="Título" required />
                    </div>
                    <div class="col-md-2">
                        <input type="text" id="isbn" class="form-control" placeholder="Nº do ISBN" required />
                    </div>
                    <div class="col-md-2">
                        <select id="publication_type" class="form-select">
                            <option value="regular">Regular</option>
                            <option value="one_shot">Edição Única</option>
                        </select>
                    </div>
                    <div class="col-md-1">
                        <input type="number" id="issue_number" class="form-control" placeholder="Nº" />
                    </div>
                    <div class="col-md-1">
                        <input type="number" id="pages" class="form-control" min="1" placeholder="Nº de Páginas" />
                    </div>
                    <div class="mb-12">
                        <label class="form-label">Links de Compra</label>

                        <div id="buyLinksContainer"></div>

                        <button
                            type="button"
                            class="btn btn-outline-primary btn-sm mt-2"
                            onclick="addBuyLinkField()"
                        >
                            + Adicionar Loja
                        </button>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label">Sinopse:</label>
                        <div id="synopsisEditor"></div>
                        <input type="hidden" id="synopsis">
                    </div>
                    <div class="col-md-9">
                        <label class="form-label">Capa do Quadrinho</label>
                        <input type="file" id="cover" class="form-control" accept="image/*">
                
                        <!-- Preview -->
                        <div class="mt-2">
                            <img id="coverPreview" class="img-thumbnail shadow-sm d-none" style="max-width: 150px;">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Preço de Capa</label>
                        <div class="row g-1">
                            <div class="col">
                                <select id="currency" class="form-select">
                                    <option value="BRL">Real (BRL)</option>
                                    <option value="USD">Dólar (USD)</option>
                                </select>
                            </div>
                            <div class="col">
                                <input type="number" step="0.01" id="cover_price" class="form-control" placeholder="Ex.: 9,90">
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Editora Original</label>
                        <select class="form-select" id="original_publisher_id">
                            <option value="">Selecione a editora original</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Editora Licenciada</label>
                        <select class="form-select" id="publisher_id">
                            <option value="">Selecione a editora</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Série</label>
                        <select id="series_id" class="form-select"></select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Gênero</label>
                        <select class="form-select" id="genre" aria-label="Default select example">
                            <option selected>Escolha:</option>
                            <option value="Fantasia">Fantasia</option>
                            <option value="Ficção Científica">Ficção Científica</option>
                            <option value="Infantil">Infantil</option>
                            <option value="Super-heróis">Super-heróis</option>
                            <option value="Terror">Terror</option>
                            <option value="Western">Western</option>
                            <option value="Outro">Outro</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Data de Publicação</label>
                        <input type="number" id="year" class="form-control" placeholder="Ano" />
                    </div>
                
                    <div class="col-md-12">
                        <div class="mb-2">
                            <label class="form-label">Histórias da Edição</label>
                
                            <div id="storiesContainer"></div>
                
                            <button type="button" class="btn btn-sm btn-outline-primary mt-2" onclick="addStoryField()">
                                ➕ Adicionar História
                            </button>               
                
                        </div>
                    </div>
                
                    <div class="col-md-12">
                        <button class="btn btn-primary w-100">Salvar</button>
                    </div>
                </form>
            </div>            
        </div>
        
        <!-- LISTAGEM DE QUADRINHOS -->
        <div class="card">
            <div class="card-header">
                <h3>Quadrinhos Cadastrados</h3>
            </div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Capa</th>
                            <th>Título</th>
                            <th>Nº</th>
                            <th>ISBN</th>
                            <th>Editora Original</th>
                            <th>Editora</th>
                            <th>Ano</th>                            
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="comicsTable"></tbody>
                </table>

                <div id="pagination" class="mt-3"></div>
            </div>            
        </div>
        

        <!-- Modal Editar Quadrinho -->
        <div class="modal fade" id="editComicModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <form id="editComicForm" class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Editar Quadrinho</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
        
                    <div class="modal-body row g-1">
                        <input type="hidden" id="edit_id">
        
                        <div class="col-md-5">
                            <label class="form-label mb-0">Título:</label>
                            <input type="text" id="edit_title" class="form-control" placeholder="Título" required>
                        </div>

                        <div class="col-md-2">
                            <label class="form-label mb-0">ISBN:</label>
                            <input type="text" id="edit_isbn" class="form-control">
                        </div>

                        <div class="col-md-2">
                            <label class="form-label mb-0">Publicação:</label>
                            <select id="edit_publication_type" class="form-select">
                                <option value="regular">Regular</option>
                                <option value="one_shot">Edição Única</option>
                            </select>
                        </div>
        
                        <div class="col-md-1">
                            <label class="form-label mb-0">Nº:</label>
                            <input type="number" id="edit_issue_number" class="form-control" placeholder="Nº">
                        </div>

                        <div class="col-md-2">
                            <label class="form-label mb-0">Páginas:</label>
                            <input type="number" id="edit_pages" class="form-control" placeholder="">
                        </div>

                        <div class="col-md-12">
                            <label class="form-label">Links de Compra</label>

                            <div id="editBuyLinksContainer"></div>

                            <button
                                type="button"
                                class="btn btn-outline-primary btn-sm mt-2"
                                onclick="addBuyLinkField(null, true)"
                            >
                                + Adicionar Loja
                            </button>
                        </div>
                        
                        <div class="col-md-12">
                            <label class="form-label">Sinopse:</label>
                            <div id="editSynopsisEditor"></div>
                            <input type="hidden" id="synopsis">
                        </div>

                        <div class="col-md-5">
                            <label class="form-label mb-0">Editora Original</label>
                            <select id="edit_original_publisher_id" class="form-select">
                                <option value="">Selecione a editora</option>
                            </select>
                        </div>

                        <div class="col-md-5">
                            <label class="form-label mb-0">Editora</label>
                            <select id="edit_publisher_id" class="form-select">
                                <option value="">Selecione a editora</option>
                            </select>
                        </div>
        
                        <div class="col-md-2">
                            <label class="form-label mb-0">Ano:</label>
                            <input type="number" id="edit_year" class="form-control" placeholder="Ano">
                        </div>

                        <div class="col-md-7">
                            <label class="form-label mb-0">Série</label>
                            <select id="edit_series_id" class="form-select"></select>
                        </div>
        
                        <div class="col-md-5">          
                            <label class="form-label mb-0">Gênero:</label>
                            <select class="form-select" id="edit_genre">
                                <option value="Fantasia">Fantasia</option>
                                <option value="Ficção Científica">Ficção Científica</option>
                                <option value="Infantil">Infantil</option>
                                <option value="Super-heróis">Super-heróis</option>
                                <option value="Terror">Terror</option>
                                <option value="Western">Western</option>
                                <option value="Outro">Outro</option>
                            </select>
                        </div>
        
                        <div class="col-md-8">
                            <label class="form-label">Nova capa (opcional)</label>
                            <input type="file" id="edit_cover" class="form-control" accept="image/*">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Preço de Capa</label>
                            <div class="row g-1">
                                <div class="col">
                                    <select id="edit_currency" class="form-select">
                                        <option value="BRL">Real (BRL)</option>
                                        <option value="USD">Dólar (USD)</option>
                                    </select>
                                </div>
                                <div class="col">
                                    <input type="number" step="0.01" id="edit_cover_price" class="form-control" placeholder="Ex.: 9,90">
                                </div>
                            </div> 
                        </div>

                        <div class="col-md-12">
                            <div id="editStoriesContainer"></div>
                            <button type="button" class="btn btn-sm btn-outline-primary mt-2" onclick="addNewStoryEdit()">
                                ➕ Adicionar História
                            </button>
                        </div>

                    </div>
        
                    <div class="modal-footer">
                        <button class="btn btn-primary">Salvar alterações</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <script src="../js/admin/config.js"></script>
    <script src="../js/admin/auth.js"></script>
    <script src="../js/admin/route-guard.js"></script>
    <script src="../js/admin/load-navbar.js"></script>
    <script src="../js/admin/navbar.js"></script>
    <script src="../assets/js/components/editor.js"></script>
    <script type="module" src="../js/admin/comics.js"></script>
</body>

</html>
