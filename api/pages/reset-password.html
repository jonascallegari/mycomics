<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Perfil do Usuário - My Comics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Core theme CSS -->
    <link href="../css/style.css" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/favicon.png" />

    <!-- Ícones (Font Awesome, se já estiver usando) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-light">
    <div id="navbar-container"></div>

    <main class="auth-container">
        <h3>Redefinir Senha</h3>

    <p class="text-muted">
        Crie uma nova senha.
    </p>

    <form id="resetForm">

    <input
        type="password"
        id="password"
        placeholder="Nova senha"
        class="form-control mb-2">

    <input
        type="password"
        id="confirmPassword"
        placeholder="Confirmar senha"
        class="form-control mb-3">

    <button class="btn btn-success">
        Salvar nova senha
    </button>

</form>
    </main>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../js/admin/config.js"></script>
    <script src="../js/admin/auth.js"></script>
    <script src="../js/public/layout.js"></script>
    <script src="../js/public/navbar.js"></script>
    <script src="../js/public/global-search.js" defer></script>
    <script src="../js/public/forgot-password.js"></script>
</body>

</html>
