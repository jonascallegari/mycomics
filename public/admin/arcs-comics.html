<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>ICDB | Quadrinhos do Arco</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet" />

    <style>
        .comic-item {
            cursor: move;
        }

        .cover-thumb {
            width: 60px;
        }
    </style>
</head>

<body>

    <div id="navbar-container"></div>

    <div class="container mt-4">

        <h2>Gerenciar Quadrinhos do Arco</h2>

        <div class="card mb-4">
            <div class="card-header">Selecionar Arco</div>

            <div class="card-body">
                <select id="arcSelect" class="form-select"></select>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">Adicionar Quadrinho</div>

            <div class="card-body">
                <select id="comicSelect" class="form-select mb-3"></select>

                <button id="addComic" class="btn btn-primary">
                    Adicionar ao Arco
                </button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                Quadrinhos deste Arco (arraste para ordenar)
            </div>

            <div class="card-body">

                <ul id="arcComicsList" class="list-group">
                </ul>

            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>

    <script src="../js/admin/config.js"></script>
    <script src="../js/admin/auth.js"></script>
    <script src="../js/admin/route-guard.js"></script>
    <script src="../js/admin/load-navbar.js"></script>
    <script src="../js/admin/navbar.js"></script>
    <script src="../js/admin/arcs-comics.js"></script>

</body>

</html>
