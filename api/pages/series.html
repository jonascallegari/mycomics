<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Comics – Séries</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Core theme CSS -->
    <link href="../css/style.css" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/favicon.png" />
</head>

<body class="bg-light">
        <div id="navbar-container"></div>
        
        <div class="container mt-4">
            <h1>Séries</h1>

            <div class="row mb-3">
                <div class="col-md-4">
                    <input type="text" id="searchSeries" class="form-control" placeholder="Buscar série...">
                </div>
            
                <div class="col-md-3">
                    <select id="orderSeries" class="form-select">
                        <option value="az">Ordenar: A–Z</option>
                        <option value="za">Ordenar: Z–A</option>
                        <option value="recent">Mais recentes</option>
                    </select>
                </div>
            </div>
            
            <div id="seriesContainer" class="row">
                <!-- carregado via JS -->
            </div>
        </div>    

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/public/config.js"></script>
    <script src="../js/admin/auth.js"></script>
    <script src="../js/public/layout.js"></script>
    <script src="../js/public/navbar.js"></script>
    <script src="/js/utils/slug.js"></script>
    <script src="/js/utils/routes.js"></script>
    <script src="../js/public/series.js"></script>    
    <script src="../js/public/global-search.js" defer></script>
</body>

</html>
