<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ICDB | Séries</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Editor de Texto -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <!-- Core theme CSS -->
    <link href="../css/style.css" rel="stylesheet" />
</head>

<body>
    <div id="navbar-container"></div> 

    <div class="container mt-4">
        <h2>Cadastro de Séries</h2>

        <!-- FORMULÁRIO DE CADASTRO -->
        <div class="card mb-4">
            <div class="card-header">Cadastrar Nova Série</div>
        
            <div class="card-body">
                <form id="seriesForm">
        
                    <div class="row">
        
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nome da Série</label>
                            <input type="text" id="name" class="form-control" required>
                        </div>
        
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Ano Inicial</label>
                            <input type="number" id="start_year" class="form-control">
                        </div>
        
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Ano Final</label>
                            <input type="number" id="end_year" class="form-control">
                        </div>
        
                    </div>
        
                    <div class="row">
        
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Editora (Publicação)</label>
                            <select id="publisher_id" class="form-select"></select>
                        </div>
        
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Editora Original</label>
                            <select id="original_publisher_id" class="form-select"></select>
                        </div>
        
                    </div>
        
                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <textarea id="description" class="form-control" rows="4"></textarea>
                    </div>
        
                    <div class="mb-3">
                        <label class="form-label">Capa da Série</label>
                        <input type="file" id="cover" class="form-control" accept="image/*">
        
                        <img id="coverPreview" class="mt-2 d-none" width="120">
                    </div>
        
                    <button class="btn btn-primary">
                        Cadastrar Série
                    </button>
        
                </form>
            </div>
        </div>
        
        <!-- LISTAGEM DE SÉRIES -->
        <div class="card">
            <div class="card-header">Séries Cadastradas</div>
        
            <div class="card-body">
        
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Capa</th>
                            <th>Nome</th>
                            <th>Editora</th>
                            <th>Editora Original</th>
                            <th>Início</th>
                            <th>Fim</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
        
                    <tbody id="seriesTable"></tbody>
                </table>
        
            </div>
        </div>
        
        </div>
        
        <!-- MODAL DE EDIÇÃO -->
        <div class="modal fade" id="editSeriesModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
        
                    <div class="modal-header">
                        <h5 class="modal-title">Editar Série</h5>
        
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
        
                    <div class="modal-body">
        
                        <form id="editSeriesForm">
        
                            <input type="hidden" id="edit_id">
        
                            <div class="row">
        
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Nome da Série</label>
                                    <input type="text" id="edit_name" class="form-control" required>
                                </div>
        
                                <div class="col-md-3 mb-3">
                                    <label class="form-label">Ano Inicial</label>
                                    <input type="number" id="edit_start_year" class="form-control">
                                </div>
        
                                <div class="col-md-3 mb-3">
                                    <label class="form-label">Ano Final</label>
                                    <input type="number" id="edit_end_year" class="form-control">
                                </div>
        
                            </div>
        
                            <div class="row">
        
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Editora</label>
                                    <select id="edit_publisher_id" class="form-select"></select>
                                </div>
        
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Editora Original</label>
                                    <select id="edit_original_publisher_id" class="form-select"></select>
                                </div>
        
                            </div>
        
                            <div class="mb-3">
                                <label class="form-label">Descrição</label>
                                <textarea id="edit_description" class="form-control" rows="4"></textarea>
                            </div>
        
                            <div class="mb-3">
                                <label class="form-label">Nova Capa (opcional)</label>
                                <input type="file" id="edit_cover" class="form-control" accept="image/*">
                            </div>
        
                            <button class="btn btn-success">
                                Salvar Alterações
                            </button>


                            <div class="card p-3 mt-3">
                                <h6>Criar edições automaticamente</h6>

                                <div class="row">
                                    <div class="col">
                                        <input type="number" id="startIssue" class="form-control" placeholder="De">
                                    </div>
                                    <div class="col">
                                        <input type="number" id="endIssue" class="form-control" placeholder="Até">
                                    </div>
                                </div>

                                <button type="button" id="generateIssues" class="btn btn-success mt-2">
                                    Gerar edições
                                </button>
                            </div>
        
                        </form>
                        </div>
                    </div>
                </div>
            </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <script src="../js/admin/config.js"></script>
    <script src="../js/admin/auth.js"></script>
    <script src="../js/admin/route-guard.js"></script>
    <script src="../js/admin/load-navbar.js"></script>
    <script src="../js/admin/navbar.js"></script>
    <script src="../assets/js/components/editor.js"></script>
    <script src="../js/admin/series.js"></script>
</body>

</html>
