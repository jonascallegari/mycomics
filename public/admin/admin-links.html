<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>ICDB Admin – Vinculações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">ICDB</a>
    
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
    
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="comics.html">Quadrinhos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="wishlist.html">Wishlist</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="my-collection.html">Minha Coleção</a>
                    </li>
                </ul>
    
                <ul class="navbar-nav" id="authMenu">
                    <!-- Conteúdo dinâmico -->
                </ul>
            </div>
        </div>
    </nav>
    <script src="js/navbar.js"></script>

    <div class="container mt-4">
        <h2>Administração de Vínculos</h2>


        <div class="card mt-3">
            <div class="card-body">
                <h5>Vincular Personagem ao Quadrinho</h5>
                <div class="row g-2">
                    <div class="col-md-5">
                        <select id="comicSelectChar" class="form-select"></select>
                    </div>
                    <div class="col-md-5">
                        <select id="characterSelect" class="form-select"></select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary w-100" onclick="linkCharacter()">Vincular</button>
                    </div>
                </div>
            </div>
        </div>


        <div class="card mt-4">
            <div class="card-body">
                <h5>Vincular Criador ao Quadrinho</h5>
                <div class="row g-2">
                    <div class="col-md-4">
                        <select id="comicSelectCreator" class="form-select"></select>
                    </div>
                    <div class="col-md-4">
                        <select id="creatorSelect" class="form-select"></select>
                    </div>
                    <div class="col-md-2">                        
                        <select id="roleInput" class="form-control" placeholder="Papel" >
                            <option>Roteirista</option>
                            <option>Desenhista</option>
                            <option>Arte-finalista</option>
                            <option>Colorista</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-success w-100" onclick="linkCreator()">Vincular</button>
                    </div>
                </div>
            </div>
        </div>


        <a href="index.html" class="btn btn-secondary mt-4">Voltar</a>
    </div>


    <script src="js/adminLinks.js"></script>
</body>

</html>
