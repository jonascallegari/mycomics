<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <title>ICDB | Criadores</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Editor de Texto -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <!-- Core theme CSS -->
    <link href="../css/style.css" rel="stylesheet" />
</head>

<body>

    <div id="navbar-container"></div>

    <div class="container mt-4">

        <h2>Cadastro de Criadores</h2>

        <!-- FORMULÁRIO -->
        <form id="creatorForm" class="row g-3">

            <div class="col-md-6">
                <input type="text" id="name" class="form-control" placeholder="Nome do Criador" required />
            </div>

            <div class="col-md-6">
                <input type="text" id="role" class="form-control" placeholder="Função (Roteirista, Desenhista...)" />
            </div>

            <div class="col-md-6">
                <input type="text" id="nationality" class="form-control" placeholder="Nacionalidade" />
            </div>

            <div class="col-md-6">
                <input type="number" id="birth_year" class="form-control" placeholder="Ano de Nascimento" />
            </div>

            <div class="col-md-12">  
                <label class="form-label">Biografia</label>
                <div id="bioEditor" class="mb-2"></div>
                <input type="hidden" id="bio">
            </div>

            <div class="col-md-12">
                <input type="file" id="image" class="form-control mb-2" accept="image/*" />
                <img id="imagePreview" class="img-fluid rounded d-none" style="max-height: 200px;">
            </div>

            <div class="col-md-12">
                <button class="btn btn-primary">Salvar</button>
            </div>

        </form>

        <hr />

        <div class="row mb-3">
            <div class="col-md-6">
                <input
                    type="text"
                    id="searchInput"
                    class="form-control"
                    placeholder="Buscar personagem..."
                >
            </div>
        </div>

        <!-- LISTAGEM -->
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Imagem</th>
                    <th>Nome</th>
                    <th>Função</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="creatorsTable"></tbody>
        </table>

        <div id="pagination" class="my-4"></div>

    </div>

    <!-- MODAL EDITAR CRIADOR -->
    <div class="modal fade" id="editCreatorModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <form id="editCreatorForm" class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Editar Criador</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body row g-3">

                    <input type="hidden" id="edit_id">

                    <div class="col-md-6">
                        <label class="form-label">Nome</label>
                        <input type="text" id="edit_name" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Função</label>
                        <input type="text" id="edit_role" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Nacionalidade</label>
                        <input type="text" id="edit_nationality" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Ano de Nascimento</label>
                        <input type="number" id="edit_birth_year" class="form-control">
                    </div>

                    <div class="col-md-12">
                        <label class="form-label">Biografia</label>                        
                        <div id="editBioEditor" class="mb-2"></div>
                        <input type="hidden" id="bio">
                    </div>

                    <div class="col-md-12">
                        <label class="form-label">Nova Imagem (opcional)</label>
                        <input type="file" id="edit_image" class="form-control mb-2" accept="image/*">
                        <img id="editImagePreview" class="img-fluid rounded d-none" style="max-height: 200px;">
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary">Salvar alterações</button>
                </div>

            </form>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <script src="../js/admin/config.js"></script>
    <script src="../js/admin/auth.js"></script>
    <script src="../js/admin/route-guard.js"></script>
    <script src="../js/admin/load-navbar.js"></script>
    <script src="../js/admin/navbar.js"></script>
    <script src="../assets/js/components/editor.js"></script>
    <script type="module" src="../js/admin/creators.js"></script>

</body>

</html>
