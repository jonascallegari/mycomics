<body class="bg-light">
        <div id="navbar-container"></div>
        
        <div class="container mt-4">
            <h1>Quadrinhos</h1>

            <div class="filters">
                <div class="row mb-4">
                    <div class="col-lg-4">
                        <select id="sortFilter" class="form-select">
                            <option value="">Ordenar por:</option>
                            <option value="title_asc">Título (A–Z)</option>
                            <option value="title_desc">Título (Z–A)</option>
                            <option value="year_desc">Mais recentes</option>
                            <option value="year_asc">Mais antigos</option>
                            <option value="popular">Mais popular</option>
                            <option value="rating_desc">Mais bem avaliado</option>
                            <option value="rating_asc">Menos bem avaliado</option>
                        </select>
                    </div>
                    <div class="col-lg-4">
                        <select id="publisherFilter" class="form-select">
                            <option value="">Todas as editoras</option>
                        </select>
                    </div>
                    <div class="col-lg-2">
                        <select id="yearFilter" class="form-select">
                            <option value="">Todos os anos</option>
                        </select>
                    </div>
                    <div class="col-lg-2">
                        <div class="d-grid gap-2">
                            <button id="filterBtn" class="btn btn-primary btn-block">Filtrar</button>
                        </div>
                        
                    </div>
                </div>  
            </div>
        
            <div id="comicsGrid" class="grid"></div>

            <ul id="pagination" class="pagination mt-3"></ul>
        </div>
