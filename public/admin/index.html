<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>ICDB Admin – Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link href="../css/style.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

    <!-- NAVBAR ADMIN -->
    <div id="navbar-container"></div>

    <div class="container mt-4">

        <h2 class="mb-4">📊 Dashboard</h2>

        <!-- Cards -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h6>Total de Quadrinhos</h6>
                        <h3 id="totalComics">—</h3>
                    </div>
                </div>
            </div>
        
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h6>Personagens</h6>
                        <h3 id="totalCharacters">—</h3>
                    </div>
                </div>
            </div>
        
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h6>Criadores</h6>
                        <h3 id="totalCreators">—</h3>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Gráfico -->
        <div class="card">
            <div class="card-body">
                <h5>Crescimento de Quadrinhos</h5>
                <canvas id="growthChart"></canvas>
            </div>
        </div>

        <!-- CARDS -->
        <div class="row g-4 mt-3">

            <div class="col-md-3">
                <div class="card shadow-sm text-center">
                    <div class="card-body">
                        <h6 class="text-muted">Quadrinhos</h6>
                        <h2 id="totalComics">—</h2>
                        <a href="comics.html" class="btn btn-sm btn-outline-primary">
                            Gerenciar
                        </a>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow-sm text-center">
                    <div class="card-body">
                        <h6 class="text-muted">Personagens</h6>
                        <h2 id="totalCharacters">—</h2>
                        <a href="characters.html" class="btn btn-sm btn-outline-primary">
                            Gerenciar
                        </a>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow-sm text-center">
                    <div class="card-body">
                        <h6 class="text-muted">Criadores</h6>
                        <h2 id="totalCreators">—</h2>
                        <a href="creators.html" class="btn btn-sm btn-outline-primary">
                            Gerenciar
                        </a>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow-sm text-center">
                    <div class="card-body">
                        <h6 class="text-muted">Editoras</h6>
                        <h2 id="totalPublishers">—</h2>
                        <a href="publishers.html" class="btn btn-sm btn-outline-primary">
                            Gerenciar
                        </a>
                    </div>
                </div>
            </div>

        </div>

        <!-- AÇÕES RÁPIDAS -->
        <div class="mt-5">
            <h4>Ações rápidas</h4>

            <div class="d-flex flex-wrap gap-2">
                <a href="comics.html" class="btn btn-success">➕ Novo Quadrinho</a>
                <a href="characters.html" class="btn btn-success">➕ Novo Personagem</a>
                <a href="creators.html" class="btn btn-success">➕ Novo Criador</a>
                <a href="publishers.html" class="btn btn-success">➕ Nova Editora</a>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../js/admin/config.js"></script>
    <script src="../js/admin/auth.js"></script> 
    <script src="../js/admin/load-navbar.js"></script>
    <script src="../js/admin/navbar.js"></script>
    <script src="../js/admin/dashboard.js"></script>
</body>

</html>
