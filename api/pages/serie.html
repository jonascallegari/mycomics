    <meta name="description"
      content="My Comics é um banco de dados de quadrinhos com informações sobre HQs, personagens, criadores, editoras, avaliações e coleções pessoais.">

        content="quadrinhos, HQ, comics, Marvel, DC Comics, Image Comics, personagens, banco de dados, graphic novels">

    <link rel="icon" type="image/png" href="/assets/img/favicon.png" />

    <style>
        #seriesCoverBg {
            background-size: cover;
            background-position: center;
            filter: blur(12px);
            height: 400px;
            width: 100%;
            position: absolute;
            z-index: -1;
            opacity: 0.3;
        }
    
        #seriesCover {
            max-height: 350px;
            border-radius: 10px;
            cursor: zoom-in;
        }
    </style>

<body>
    <div id="navbar-container"></div>

    <div id="seriesCoverBg"></div>
    
    <div class="container mt-4">
    
        <div class="row mb-4">
            <div class="col-md-4 text-center">
                <img id="seriesCover" class="img-fluid d-none" />
            </div>
    
            <div class="col-md-8">
                <h1 id="seriesName"></h1>
    
                <p>
                    <strong>Editora Original:</strong>
                    <span id="seriesPublisher"></span>
                </p>
    
                <p id="seriesDescription"></p>
            </div>
        </div>
    
    
        <h4>Quadrinhos desta série</h4>
    
        <div id="seriesComics" class="row mt-3"></div>
    </div>
    
    <!-- MODAL ZOOM -->
    <div class="modal fade" id="coverModal" tabindex="-1" aria-hidden="true">

            <div class="modal-content bg-transparent border-0">
                <div class="modal-body text-center">

    <script src="../js/public/global-search.js" defer></script>
