<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Comics – Detalhes do Personagem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Core theme CSS -->
    <link href="../css/style.css" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/favicon.png" />
</head>

<body class="bg-light">
    
        <div id="navbar-container"></div>
        
        <!-- HERO -->
        <div class="character-hero">
            <div class="character-bg" id="characterBg"></div>
        
            <div class="character-content container text-center">
                <img id="characterImage" class="character-image">
                <h1 id="characterName"></h1>
                <h5 id="characterAlias" class="text-light"></h5>
            </div>
        </div>
        
        <!-- CONTEÚDO -->
        <div class="container mt-5">
            <div class="row mb-4">
                <div class="col-md-3">
                    <h4>Informações</h4>
                    <ul class="list-group shadow-sm">
                        <li class="list-group-item">
                            <strong>Editora:</strong>
                            <a id="characterPublisher" class="text-decoration-none fw-semibold" target="_self">
                            </a>
                        </li>
                        <li class="list-group-item">
                            <strong>Primeira Aparição:</strong><br>
                            <span id="characterFirstAppearance"></span>
                        </li>
                    </ul>
                </div>

                <!-- HISTÓRICO -->
                <div class="col-md-9">
                    <h3>Histórico</h3>
                    <p id="characterHistory" class="text-justify"></p>
                </div>
            </div>
        
            <hr>
        
            <h3>Quadrinhos relacionados</h3>
            <div class="row" id="comicsList"></div>
        </div>

      

    <!-- MODAL ZOOM CAPA -->
    <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal">
            <div class="modal-content bg-transparent border-0">
                <div class="modal-body text-center p-0">
                    <img id="imageZoom" src="" class="img-fluid rounded shadow-lg" alt="Imagem ampliada" />
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../js/admin/config.js"></script>
    <script src="../js/admin/auth.js"></script>    
    <script src="../js/public/layout.js"></script>
    <script src="../js/public/navbar.js"></script>
    <script src="/js/utils/slug.js"></script>
    <script src="/js/utils/routes.js"></script>
    <script src="../js/public/characterDetail.js"></script>
    <script src="../js/public/global-search.js" defer></script>    
</body>

</html>
